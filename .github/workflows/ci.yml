name: Continuous Integration

on:
  pull_request:
    branches:
      - develop

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my-slack-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-slack-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # 1. 型チェック (TypeScript)
      - name: Type check
        run: npx tsc --noEmit

      # 2. 静的解析 (ESLint)
      - name: Lint check
        run: npm run lint

      # 3. ビルドチェック (本番ビルドが通るか確認)
      - name: Build check
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy
          JWT_SECRET: dummy-secret-for-build

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my-slack-app

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      JWT_SECRET: test-secret-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-slack-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      # 自動テスト (E2E)
      - name: Run E2E tests
        run: npm run test:e2e
