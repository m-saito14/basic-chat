name: Continuous Integration

on:
  pull_request:
    branches:
      - develop

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my-slack-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-slack-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # 1. 型チェック (TypeScript)
      - name: Type check
        run: npx tsc --noEmit

      # 2. 静的解析 (ESLint)
      - name: Lint check
        run: npm run lint

      # 3. ビルドチェック (本番ビルドが通るか確認)
      - name: Build check
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy
          JWT_SECRET: dummy-secret-for-build

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: ./my-slack-app

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      JWT_SECRET: test-secret-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-slack-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      # 自動テスト (E2E)
      - name: Run E2E tests
        id: e2e_tests
        run: npx vitest run --config vitest.config.ts --reporter=verbose --reporter=junit --outputFile.junit=test-results/junit.xml
        continue-on-error: true

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: my-slack-app/test-results/junit.xml
          check_name: E2E Test Results

      - name: Fail if E2E tests failed
        if: steps.e2e_tests.outcome == 'failure'
        run: exit 1

  test-socket-server:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      JWT_SECRET: test-secret-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-slack-app/package-lock.json

      - name: Install main app dependencies
        working-directory: ./my-slack-app
        run: npm ci

      - name: Install socket-server dependencies
        working-directory: ./my-slack-app/socket-server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./my-slack-app
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./my-slack-app
        run: npx prisma migrate deploy

      - name: Run socket-server tests
        id: socket_tests
        working-directory: ./my-slack-app/socket-server
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=test-results/junit.xml
        continue-on-error: true

      - name: Publish socket-server test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: my-slack-app/socket-server/test-results/junit.xml
          check_name: Socket Server Test Results

      - name: Fail if socket-server tests failed
        if: steps.socket_tests.outcome == 'failure'
        run: exit 1
